<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ushuaia · Julho 2026 — Roteiro de Viagem em Família</title>
<meta name="description" content="Roteiro completo de 8 dias em Ushuaia, Argentina, de 15 a 22 de julho de 2026. Esqui no Cerro Castor, Glaciar Martial, trenó com huskies, final da Copa do Mundo, Museu Marítimo do Presídio.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a1628;
    --ink-soft: #1e2d44;
    --ink-mute: #4a5d76;
    --paper: #fafaf7;
    --paper-warm: #f4f0e8;
    --paper-cool: #eef1f4;
    --ice: #c5d5e0;
    --ice-deep: #6b8aa3;
    --ember: #c8511e;
    --ember-soft: #e8a47a;
    --gold: #b8893d;
    --rule: #d4d0c5;
    --rule-soft: #e8e4da;
    --shadow-sm: 0 1px 3px rgba(10, 22, 40, 0.06);
    --shadow: 0 1px 3px rgba(10, 22, 40, 0.06), 0 8px 24px rgba(10, 22, 40, 0.08);
    --shadow-lg: 0 4px 12px rgba(10, 22, 40, 0.08), 0 24px 48px rgba(10, 22, 40, 0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.65;
    font-size: 15px;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
  }
  .page { max-width: 960px; margin: 0 auto; padding: 0 32px; }
  ::selection { background: var(--ember); color: white; }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 48px 32px;
    background:
      radial-gradient(ellipse at 15% 110%, rgba(200, 81, 30, 0.10), transparent 50%),
      radial-gradient(ellipse at 85% -10%, rgba(107, 138, 163, 0.20), transparent 50%),
      linear-gradient(180deg, var(--paper) 0%, var(--paper-warm) 100%);
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(var(--ice) 1px, transparent 1px),
      linear-gradient(90deg, var(--ice) 1px, transparent 1px);
    background-size: 80px 80px;
    opacity: 0.06;
    pointer-events: none;
  }
  .hero-inner {
    max-width: 960px; margin: 0 auto; width: 100%;
    display: flex; flex-direction: column;
    flex: 1; justify-content: space-between;
    position: relative; z-index: 1;
  }
  .hero-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--ink-soft);
  }
  .hero-top span:last-child { text-align: right; }
  .hero-center {
    flex: 1;
    display: flex; flex-direction: column; justify-content: center;
    margin: 80px 0;
  }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--ember);
    margin-bottom: 32px;
    display: flex; align-items: center; gap: 16px;
  }
  .eyebrow::before { content: ''; width: 48px; height: 1px; background: var(--ember); }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(56px, 11vw, 132px);
    font-weight: 400;
    line-height: 0.92;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 32px;
  }
  h1 em {
    font-style: italic; color: var(--ember); font-weight: 300;
    display: block;
  }
  .hero-sub {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(18px, 2vw, 24px);
    font-weight: 300; font-style: italic;
    color: var(--ink-soft);
    max-width: 580px;
    line-height: 1.4;
  }
  .hero-bottom {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
    padding-top: 32px;
    border-top: 1px solid var(--rule);
  }
  .hero-stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 6px;
  }
  .hero-stat-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 500;
    color: var(--ink);
  }

  /* SECTION COMMON */
  section { padding: 96px 0; border-bottom: 1px solid var(--rule-soft); }
  section:last-of-type { border-bottom: none; }
  .section-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.3em;
    color: var(--ember);
    margin-bottom: 16px;
  }
  h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(36px, 5vw, 56px);
    font-weight: 400;
    line-height: 1;
    letter-spacing: -0.01em;
    margin-bottom: 12px;
  }
  h2 em { font-style: italic; color: var(--ember); }
  .section-sub {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 300; font-style: italic;
    color: var(--ink-mute);
    margin-bottom: 56px;
    max-width: 600px;
    line-height: 1.4;
  }
  h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px; font-weight: 500;
    line-height: 1.15;
    margin-bottom: 12px;
    color: var(--ink);
  }
  h4 {
    font-family: 'Inter', sans-serif;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ember);
    margin-bottom: 10px;
  }
  p { margin-bottom: 14px; color: var(--ink-soft); }
  a { color: var(--ember); text-decoration: none; border-bottom: 1px solid currentColor; transition: color 0.2s; }
  a:hover { color: var(--ink); }

  /* OVERVIEW */
  .overview-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 64px;
    align-items: start;
  }
  .overview-text p { font-size: 16px; line-height: 1.75; }
  .overview-meta {
    background: var(--paper-warm);
    border-left: 2px solid var(--ember);
    padding: 32px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 2;
  }
  .overview-meta strong {
    display: block;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ember);
    margin-top: 16px;
    margin-bottom: 4px;
  }
  .overview-meta strong:first-child { margin-top: 0; }

  /* ACCOMMODATION CARD */
  .accommodation {
    background: white;
    border: 1px solid var(--rule-soft);
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    margin-bottom: 32px;
  }
  .accommodation-visual {
    height: 320px;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(255, 255, 255, 0.15), transparent 60%),
      linear-gradient(135deg, #1a3a5c 0%, #0a1628 60%, #1e2d44 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    padding: 40px;
  }
  /* Stars background */
  .accommodation-visual::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1.5px 1.5px at 8% 15%, white, transparent),
      radial-gradient(1px 1px at 22% 28%, rgba(255,255,255,0.7), transparent),
      radial-gradient(2px 2px at 38% 12%, white, transparent),
      radial-gradient(1px 1px at 50% 22%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 62% 8%, white, transparent),
      radial-gradient(1px 1px at 78% 18%, rgba(255,255,255,0.7), transparent),
      radial-gradient(2px 2px at 90% 30%, white, transparent),
      radial-gradient(1px 1px at 15% 42%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1.5px 1.5px at 70% 38%, white, transparent),
      radial-gradient(1px 1px at 92% 50%, rgba(255,255,255,0.5), transparent);
    opacity: 0.85;
  }
  /* Mountains */
  .accommodation-visual::after {
    content: '';
    position: absolute;
    bottom: 0; left: -5%; right: -5%;
    height: 65%;
    background:
      linear-gradient(180deg, transparent 0%, rgba(10, 22, 40, 0.4) 100%),
      conic-gradient(from 200deg at 20% 100%, transparent 0deg, #2a4566 35deg, transparent 70deg),
      conic-gradient(from 195deg at 50% 100%, transparent 0deg, #1f3552 30deg, transparent 60deg),
      conic-gradient(from 200deg at 75% 100%, transparent 0deg, #2a4566 40deg, transparent 80deg);
    clip-path: polygon(0 35%, 12% 8%, 22% 28%, 35% 12%, 48% 38%, 58% 18%, 72% 32%, 85% 5%, 100% 25%, 100% 100%, 0 100%);
  }
  .accommodation-visual-text {
    position: relative;
    z-index: 2;
    color: white;
  }
  .accommodation-visual-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ember-soft);
    margin-bottom: 12px;
  }
  .accommodation-visual h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px;
    font-weight: 400;
    color: white;
    margin-bottom: 8px;
    line-height: 1;
  }
  .accommodation-visual-tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    color: rgba(255, 255, 255, 0.85);
  }
  .accommodation-body {
    padding: 40px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
  }
  .accommodation-info p { color: var(--ink-soft); }
  .accommodation-stats {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .accommodation-stat {
    padding-bottom: 16px;
    border-bottom: 1px solid var(--rule-soft);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .accommodation-stat:last-child { border-bottom: none; padding-bottom: 0; }
  .accommodation-stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-mute);
  }
  .accommodation-stat-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
  }
  .accommodation-stat-value.gold { color: var(--gold); }
  .accommodation-stat-value.ember { color: var(--ember); }
  .booking-cta {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 16px 28px;
    background: var(--ink);
    color: white !important;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 0.05em;
    border: none;
    margin-top: 16px;
    transition: all 0.3s;
  }
  .booking-cta:hover {
    background: var(--ember);
    transform: translateY(-2px);
  }
  .booking-cta::after {
    content: '→';
    font-size: 18px;
  }

  /* DAY CARDS */
  .day {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 48px;
    padding: 40px 0;
    border-top: 1px solid var(--rule-soft);
    align-items: start;
  }
  .day:first-of-type { border-top: 1px solid var(--rule); }
  .day-meta {
    position: sticky; top: 32px;
  }
  .day-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 84px;
    font-weight: 300;
    line-height: 1;
    color: var(--ember);
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }
  .day-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 12px;
  }
  .day-tag {
    display: inline-block;
    padding: 4px 12px;
    background: var(--paper-warm);
    border: 1px solid var(--rule);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .day-content h3 {
    font-size: 32px;
    margin-bottom: 8px;
  }
  .day-content > p:first-of-type {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-style: italic;
    color: var(--ink-mute);
    margin-bottom: 24px;
  }
  .timeline {
    margin-top: 24px;
    border-left: 1px solid var(--rule);
    padding-left: 24px;
  }
  .timeline-item {
    position: relative;
    padding-bottom: 20px;
  }
  .timeline-item:last-child { padding-bottom: 0; }
  .timeline-item::before {
    content: '';
    position: absolute;
    left: -28px; top: 8px;
    width: 7px; height: 7px;
    background: var(--ember);
    border-radius: 50%;
  }
  .timeline-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ember);
    font-weight: 500;
  }
  .timeline-text {
    font-size: 14px;
    color: var(--ink-soft);
    margin-top: 2px;
  }
  .timeline-text strong {
    color: var(--ink);
    font-weight: 600;
  }

  /* RESTAURANTS */
  .restaurants-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 24px;
  }
  .restaurant {
    border: 1px solid var(--rule-soft);
    padding: 28px;
    background: white;
    transition: all 0.3s;
  }
  .restaurant:hover {
    border-color: var(--ember);
    box-shadow: var(--shadow);
  }
  .restaurant-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 500;
    margin-bottom: 4px;
    color: var(--ink);
  }
  .restaurant-name-link {
    text-decoration: none;
    border-bottom: none;
    display: block;
    transition: color 0.2s;
  }
  .restaurant-name-link:hover .restaurant-name { color: var(--ember); }
  .restaurant-name-link::after {
    content: '↗';
    font-size: 11px;
    color: var(--ember);
    margin-left: 6px;
    vertical-align: super;
  }
  .restaurant-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 14px;
    padding: 12px 0;
    border-top: 1px dotted var(--rule);
    border-bottom: 1px dotted var(--rule);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-mute);
    letter-spacing: 0.02em;
  }
  .restaurant-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ember);
    margin-bottom: 12px;
  }
  .restaurant-desc {
    font-size: 14px;
    color: var(--ink-soft);
    margin-bottom: 16px;
    line-height: 1.6;
  }
  .restaurant-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 12px;
    border-top: 1px solid var(--rule-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-mute);
  }
  .restaurant-day {
    color: var(--gold);
    font-weight: 500;
  }

  /* BUDGET TABLE */
  .budget {
    background: white;
    border: 1px solid var(--rule-soft);
    box-shadow: var(--shadow);
  }
  .budget-row {
    display: grid;
    grid-template-columns: 60px 1fr auto;
    gap: 24px;
    padding: 20px 32px;
    border-bottom: 1px solid var(--rule-soft);
    align-items: center;
  }
  .budget-row:last-child { border-bottom: none; }
  .budget-icon {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ember);
    letter-spacing: 0.1em;
  }
  .budget-name { color: var(--ink); font-size: 15px; }
  .budget-name span { display: block; font-size: 12px; color: var(--ink-mute); margin-top: 2px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em; }
  .budget-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
  }
  .budget-total {
    background: var(--ink);
    color: white;
  }
  .budget-total .budget-icon { color: var(--ember-soft); }
  .budget-total .budget-name { color: white; font-weight: 600; }
  .budget-total .budget-value { color: var(--ember-soft); font-size: 32px; }

  /* COMPOSITION CHART */
  .composition {
    margin-top: 48px;
    padding: 32px;
    background: var(--paper-warm);
    border-left: 2px solid var(--ember);
  }
  .composition-bar {
    display: flex;
    height: 40px;
    margin: 24px 0;
    border-radius: 2px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  .composition-segment {
    height: 100%;
    transition: all 0.3s;
    cursor: default;
  }
  .composition-segment:hover { transform: scaleY(1.1); }
  .composition-legend {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  .composition-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--ink-soft);
  }
  .composition-dot {
    width: 12px; height: 12px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .composition-pct {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    color: var(--ink);
  }

  /* RESERVATIONS TIMELINE */
  .reservations {
    border-left: 2px solid var(--ember);
    padding-left: 32px;
    margin-left: 16px;
  }
  .reservation-block {
    padding-bottom: 32px;
    position: relative;
  }
  .reservation-block:last-child { padding-bottom: 0; }
  .reservation-block::before {
    content: '';
    position: absolute;
    left: -39px; top: 4px;
    width: 14px; height: 14px;
    background: white;
    border: 2px solid var(--ember);
    border-radius: 50%;
  }
  .reservation-when {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ember);
    font-weight: 500;
    margin-bottom: 8px;
  }
  .reservation-list {
    list-style: none;
    padding: 0;
  }
  .reservation-list li {
    padding: 10px 0;
    border-bottom: 1px dotted var(--rule);
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--ink-soft);
    font-size: 14px;
  }
  .reservation-list li:last-child { border-bottom: none; }
  .reservation-list li strong {
    color: var(--ink);
    font-weight: 500;
  }
  .reservation-list li span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gold);
    margin-left: 16px;
  }

  /* ATTENTION POINTS */
  .attention-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 32px;
  }
  .attention-card {
    padding: 28px;
    background: white;
    border-top: 3px solid var(--ember);
    box-shadow: var(--shadow-sm);
  }
  .attention-card h4 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
    text-transform: none;
    letter-spacing: 0;
    margin-bottom: 12px;
  }
  .attention-card p, .attention-card li {
    font-size: 14px;
    line-height: 1.6;
    color: var(--ink-soft);
  }
  .attention-card ul {
    list-style: none;
    padding: 0;
  }
  .attention-card li {
    padding-left: 16px;
    position: relative;
    margin-bottom: 8px;
  }
  .attention-card li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: var(--ember);
  }

  /* GALLERY LINKS */
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-top: 24px;
  }
  .gallery-link {
    border: 1px solid var(--rule-soft);
    padding: 20px;
    background: white;
    text-decoration: none;
    border-bottom: 1px solid var(--rule-soft);
    transition: all 0.3s;
    color: var(--ink) !important;
  }
  .gallery-link:hover {
    border-color: var(--ember);
    transform: translateY(-2px);
    box-shadow: var(--shadow);
    color: var(--ink) !important;
  }
  .gallery-link-icon {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ember);
    margin-bottom: 8px;
    letter-spacing: 0.1em;
  }
  .gallery-link-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .gallery-link-url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-mute);
    word-break: break-all;
  }

  /* FOOTER */
  footer {
    padding: 64px 32px;
